server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docusaurus emits trailing-slash routes by default; serve index.html when
  # the requested path doesn't map to a real file.
  # Preserve the original host+port across the auto-added trailing-slash
  # redirect (otherwise nginx redirects to bare :80 and breaks the docker
  # port mapping).
  absolute_redirect off;
  port_in_redirect off;

  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  # Long cache for hashed assets, no cache for the entrypoint HTML.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Gzip — text payloads dominate; brotli would be nicer but adds a build step.
  gzip on;
  gzip_types
    text/plain text/css text/javascript application/javascript application/json
    application/xml image/svg+xml;
  gzip_min_length 1024;
}
